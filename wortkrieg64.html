<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORTKRIEG 64</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
body{font-family:'Press Start 2P',monospace;color:#cc0000;}
#app{position:relative;width:100vw;height:100vh;overflow:hidden;}
canvas#gc{position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated;cursor:none;}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:30;}
.screen.on{display:flex;}
.panel{background:#0a0000;border:2px solid #440000;padding:14px;}
.panel-title{font-size:6px;color:#660000;margin-bottom:10px;letter-spacing:1px;border-bottom:1px solid #220000;padding-bottom:6px;}
.mbtn{font-family:'Press Start 2P',monospace;font-size:8px;background:#000;color:#c80000;border:2px solid #c80000;padding:9px 18px;cursor:pointer;letter-spacing:1px;transition:background .1s,color .1s;}
.mbtn:hover{background:#c80000;color:#000;}
.mbtn.sm{font-size:6px;padding:6px 12px;}
.mbtn.xs{font-size:5px;padding:4px 8px;}
.mbtn.green{color:#00cc44;border-color:#00cc44;}.mbtn.green:hover{background:#00cc44;color:#000;}
.mbtn.dim{color:#444;border-color:#333;}.mbtn.dim:hover{background:#222;color:#888;}
.mbtn.yellow{color:#ccaa00;border-color:#ccaa00;}.mbtn.yellow:hover{background:#ccaa00;color:#000;}
.inp{font-family:'Press Start 2P',monospace;font-size:7px;background:#000;border:2px solid #440000;color:#cc4400;padding:6px 8px;outline:none;width:100%;}
.inp:focus{border-color:#880000;}.inp::placeholder{color:#220000;}
#menu{background:#000;z-index:35;}
#menu-canvas{image-rendering:pixelated;max-width:100%;display:block;}
.deck-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.deck-item{display:flex;align-items:center;gap:8px;background:#0a0000;border:2px solid #330000;padding:10px 12px;cursor:pointer;transition:border-color .15s;}
.deck-item:hover{border-color:#880000;}.deck-item.selected{border-color:#cc0000;background:#110000;}
.deck-item .di-name{font-size:7px;color:#cc4400;flex:1;}
.deck-item .di-count{font-size:5px;color:#440000;}
.deck-item .di-due{font-size:5px;color:#880000;background:#1a0000;padding:2px 5px;border:1px solid #440000;}
#hud{position:absolute;bottom:0;left:0;right:0;height:88px;z-index:20;pointer-events:none;display:none;}
#hud.on{display:block;}
#hud canvas{image-rendering:pixelated;width:100%;height:100%;}
#wordbar{position:absolute;top:0;left:0;right:0;height:40px;z-index:20;background:rgba(0,0,0,.93);border-bottom:2px solid #440000;display:none;align-items:center;justify-content:center;gap:16px;padding:0 12px;}
#wordbar.on{display:flex;}
#wb-label{font-size:6px;color:#550000;}
#wb-word{font-size:13px;color:#ff3300;letter-spacing:2px;}
#wb-prog{font-size:6px;color:#330000;margin-left:auto;}
#wb-deck{font-size:5px;color:#330000;}
#rend{position:absolute;inset:0;z-index:32;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;}
#rend.on{display:flex;}
#rend-box{background:#000;border:3px solid #c80000;padding:28px 36px;text-align:center;max-width:420px;width:90%;}
#rend-box h2{font-size:11px;color:#c80000;margin-bottom:16px;}
#rend-box p{font-size:6px;color:#550000;margin:5px 0;line-height:2;}
#rend-box strong{color:#ff3300;}
#stats{background:#000;z-index:34;overflow-y:auto;flex-direction:column;}
#stats.on{display:flex;}
#stats-inner{max-width:720px;width:100%;margin:0 auto;padding:20px 16px 50px;display:flex;flex-direction:column;gap:14px;}
.stitle{font-size:10px;color:#c80000;border-bottom:2px solid #330000;padding-bottom:8px;}
#bar-chart-wrap{display:flex;flex-direction:column;gap:8px;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-cat{font-size:6px;color:#660000;width:86px;text-align:right;flex-shrink:0;}
.bar-track{flex:1;height:18px;background:#080000;border:1px solid #220000;position:relative;}
.bar-fill{height:100%;position:absolute;left:0;top:0;transition:width .6s;}
.bar-count{font-size:6px;color:#880000;min-width:60px;}
.ftabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.ftab{font-family:'Press Start 2P',monospace;font-size:5px;background:#000;border:1px solid #330000;color:#440000;padding:4px 8px;cursor:pointer;}
.ftab.act{border-color:#c80000;color:#c80000;}
#wlist{max-height:220px;overflow-y:auto;}
.wrow{display:flex;align-items:center;gap:8px;padding:4px;border-bottom:1px solid #110000;font-size:6px;}
.wrow .wg{color:#cc6600;min-width:80px;}.wrow .wp{color:#440000;flex:1;}
.lvbadge{font-size:5px;padding:1px 5px;border:1px solid;min-width:38px;text-align:center;}
.lv0{color:#333;border-color:#222;}.lv1{color:#880000;border-color:#660000;}
.lv2{color:#aa5500;border-color:#883300;}.lv3{color:#aaaa00;border-color:#888800;}
.lv4{color:#00aa44;border-color:#007733;}.lv5{color:#0066cc;border-color:#004488;}
.duepip{font-size:5px;color:#ff0000;border:1px solid #880000;padding:1px 4px;}
.word-table{width:100%;border-collapse:collapse;font-size:6px;}
.word-table th{color:#440000;padding:4px 6px;text-align:left;border-bottom:1px solid #220000;}
.word-table td{color:#660000;padding:4px 6px;border-bottom:1px solid #120000;}
.word-table tr:hover td{background:#0d0000;}
.del-btn{font-family:'Press Start 2P',monospace;font-size:4px;background:#000;border:1px solid #440000;color:#660000;padding:2px 5px;cursor:pointer;}
.del-btn:hover{background:#440000;color:#cc0000;}
#flash{position:absolute;inset:0;pointer-events:none;z-index:19;opacity:0;}
@keyframes flashAnim{0%{opacity:.5}100%{opacity:0}}
#msg{position:absolute;top:48px;left:50%;transform:translateX(-50%);font-size:7px;background:#000;border:2px solid #c80000;padding:5px 12px;color:#ff0000;z-index:25;pointer-events:none;opacity:0;transition:opacity .15s;white-space:nowrap;}
#msg.on{opacity:1;}
#scan{position:absolute;inset:0;pointer-events:none;z-index:22;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.1) 3px,rgba(0,0,0,.1) 4px);}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#000;}::-webkit-scrollbar-thumb{background:#330000;}
.dlabel{position:absolute;z-index:15;pointer-events:none;font-family:'Press Start 2P',monospace;font-size:7px;background:rgba(0,0,0,.9);border:1px solid #660000;color:#ffcc00;padding:2px 6px;transform:translateX(-50%);white-space:nowrap;}
</style>
</head>
<body>
<div id="app">
  <canvas id="gc"></canvas>
  <div id="scan"></div>
  <div id="flash"></div>
  <div id="msg"></div>
  <div id="wordbar">
    <span id="wb-deck"></span>
    <span id="wb-label">TRANSLATE ▶</span>
    <span id="wb-word">—</span>
    <span id="wb-prog">0/0</span>
  </div>
  <div id="hud"><canvas id="hudc"></canvas></div>
  <div id="dlabels" style="position:absolute;inset:0;pointer-events:none;z-index:16;"></div>

  <!-- MENU -->
  <div id="menu" class="screen on">
    <canvas id="mc"></canvas>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:10px;">
      <button class="mbtn" onclick="showDeckSelect()">▶ SELECT DECK &amp; PLAY</button>
      <button class="mbtn" onclick="showDeckMgr()">◈ MANAGE DECKS</button>
      <button class="mbtn" onclick="showStats()">◈ INTEL / STATS</button>
      <div style="display:flex;gap:6px;margin-top:4px;">
        <button class="mbtn sm dim" onclick="exportData()">↓ EXPORT SAVE</button>
        <button class="mbtn sm dim" onclick="document.getElementById('imp-file').click()">↑ IMPORT SAVE</button>
        <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importData(event)">
      </div>
      <div style="font-size:5px;color:#1a0000;margin-top:6px;">YOUR ID: <span id="uid-label" style="color:#330000;"></span></div>
    </div>
  </div>

  <!-- DECK SELECT -->
  <div id="deck-select" class="screen" style="overflow-y:auto;">
    <div style="max-width:600px;width:95%;padding:20px 0;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
        <div class="stitle">SELECT DECK TO PLAY</div>
        <button class="mbtn sm dim" onclick="goMenu()">← BACK</button>
      </div>
      <div class="deck-list" id="deck-list-play"></div>
      <div style="display:flex;gap:8px;justify-content:center;">
        <button class="mbtn green" id="play-btn" onclick="playSelected()" disabled>▶ PLAY SELECTED</button>
      </div>
    </div>
  </div>

  <!-- DECK MANAGER -->
  <div id="deck-mgr" class="screen" style="overflow-y:auto;">
    <div id="deck-mgr-inner" style="max-width:700px;width:95%;padding:20px 0 60px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
        <div class="stitle">DECK MANAGER</div>
        <button class="mbtn sm dim" onclick="goMenu()">← BACK</button>
      </div>
      <div class="panel" style="margin-bottom:12px;">
        <div class="panel-title">CREATE NEW DECK</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <input class="inp" id="new-deck-name" placeholder="DECK NAME..." style="flex:1;min-width:140px;">
          <button class="mbtn green sm" onclick="createDeck()">+ CREATE</button>
        </div>
      </div>
      <div id="deck-editor-area"></div>
    </div>
  </div>

  <!-- ROUND END -->
  <div id="rend">
    <div id="rend-box">
      <h2 id="re-title">LEVEL COMPLETE</h2>
      <div id="re-body"></div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap;">
        <button class="mbtn" onclick="replayDeck()">PLAY AGAIN</button>
        <button class="mbtn" onclick="showDeckSelect()">CHANGE DECK</button>
        <button class="mbtn" onclick="showStats()">STATS</button>
        <button class="mbtn dim" onclick="goMenu()">MENU</button>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div id="stats" class="screen">
    <div id="stats-inner">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <div class="stitle">// INTEL DATABASE</div>
        <div style="display:flex;gap:6px;"><button class="mbtn sm" onclick="showDeckSelect()">PLAY</button><button class="mbtn sm dim" onclick="goMenu()">MENU</button></div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
        <span style="font-size:6px;color:#440000;">DECK:</span>
        <div id="stats-deck-tabs" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
      </div>
      <div class="panel">
        <div class="panel-title">WORD MASTERY BREAKDOWN</div>
        <div id="bar-chart-wrap">
          <div class="bar-row"><span class="bar-cat">UNKNOWN</span><div class="bar-track"><div class="bar-fill" id="bf0" style="background:#222;"></div></div><span class="bar-count" id="bc0">0</span></div>
          <div class="bar-row"><span class="bar-cat">LEARNING</span><div class="bar-track"><div class="bar-fill" id="bf1" style="background:#880000;"></div></div><span class="bar-count" id="bc1">0</span></div>
          <div class="bar-row"><span class="bar-cat">FAMILIAR</span><div class="bar-track"><div class="bar-fill" id="bf2" style="background:#cc5500;"></div></div><span class="bar-count" id="bc2">0</span></div>
          <div class="bar-row"><span class="bar-cat">GOOD</span><div class="bar-track"><div class="bar-fill" id="bf3" style="background:#aaaa00;"></div></div><span class="bar-count" id="bc3">0</span></div>
          <div class="bar-row"><span class="bar-cat">STRONG</span><div class="bar-track"><div class="bar-fill" id="bf4" style="background:#228833;"></div></div><span class="bar-count" id="bc4">0</span></div>
          <div class="bar-row"><span class="bar-cat">MASTERED</span><div class="bar-track"><div class="bar-fill" id="bf5" style="background:#224488;"></div></div><span class="bar-count" id="bc5">0</span></div>
        </div>
        <div style="margin-top:10px;font-size:5px;color:#330000;line-height:2.2;">
          TOTAL: <span id="s-total" style="color:#660000;">0</span> &nbsp;|&nbsp;
          SEEN: <span id="s-seen" style="color:#660000;">0</span> &nbsp;|&nbsp;
          DUE: <span id="s-due" style="color:#880000;">0</span> &nbsp;|&nbsp;
          ACC: <span id="s-acc" style="color:#660000;">0</span>%
        </div>
      </div>
      <div class="panel">
        <div class="panel-title">ACTIVITY — LAST 28 DAYS</div>
        <div id="heatmap" style="display:flex;flex-wrap:wrap;gap:3px;"></div>
      </div>
      <div class="panel">
        <div class="panel-title">WORD INTEL</div>
        <div class="ftabs" id="ftabs"></div>
        <div id="wlist"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── USER ID (isolates data per browser) ──
let UID=localStorage.getItem('wk64_uid');
if(!UID){UID='u'+Math.random().toString(36).slice(2,10)+Date.now().toString(36);localStorage.setItem('wk64_uid',UID);}
const STORE='wk64_'+UID;

// ── BASE VOCAB ──
const BV=[
  ["sein","być"],["haben","mieć"],["werden","zostać"],["können","móc"],["müssen","musieć"],
  ["sagen","mówić"],["machen","robić"],["gehen","iść"],["kommen","przychodzić"],["sehen","widzieć"],
  ["wollen","chcieć"],["wissen","wiedzieć"],["lassen","pozwolić"],["stehen","stać"],["finden","znajdować"],
  ["bleiben","zostać"],["liegen","leżeć"],["heißen","nazywać się"],["denken","myśleć"],["nehmen","brać"],
  ["tun","czynić"],["glauben","wierzyć"],["halten","trzymać"],["nennen","nazywać"],["zeigen","pokazywać"],
  ["führen","prowadzić"],["sprechen","mówić"],["bringen","przynosić"],["leben","żyć"],["fahren","jechać"],
  ["meinen","sądzić"],["fragen","pytać"],["kennen","znać"],["geben","dawać"],["lesen","czytać"],
  ["laufen","biec"],["spielen","grać"],["arbeiten","pracować"],["brauchen","potrzebować"],["folgen","podążać"],
  ["lernen","uczyć się"],["verstehen","rozumieć"],["beginnen","zaczynać"],["schreiben","pisać"],["kaufen","kupować"],
  ["essen","jeść"],["trinken","pić"],["schlafen","spać"],["öffnen","otwierać"],["schließen","zamykać"],
  ["helfen","pomagać"],["suchen","szukać"],["hören","słyszeć"],["warten","czekać"],["vergessen","zapominać"],
  ["fühlen","czuć"],["treffen","spotykać"],["reisen","podróżować"],["kochen","gotować"],["verlieren","tracić"],
  ["gewinnen","wygrywać"],["bauen","budować"],["wohnen","mieszkać"],["zahlen","płacić"],["träumen","marzyć"],
  ["lachen","śmiać się"],["weinen","płakać"],["tanzen","tańczyć"],["singen","śpiewać"],["schwimmen","pływać"],
  ["fliegen","latać"],["fallen","spadać"],["setzen","sadzać"],["legen","kłaść"],["stellen","stawiać"],
  ["Haus","dom"],["Mann","mężczyzna"],["Frau","kobieta"],["Kind","dziecko"],["Tag","dzień"],
  ["Jahr","rok"],["Zeit","czas"],["Hand","ręka"],["Welt","świat"],["Mensch","człowiek"],
  ["Land","kraj"],["Stadt","miasto"],["Geld","pieniądze"],["Frage","pytanie"],["Arbeit","praca"],
  ["Weg","droga"],["Ende","koniec"],["Seite","strona"],["Nacht","noc"],["Schule","szkoła"],
  ["Buch","książka"],["Auto","samochód"],["Wasser","woda"],["Feuer","ogień"],["Licht","światło"],
  ["Stein","kamień"],["Baum","drzewo"],["Blume","kwiat"],["Tier","zwierzę"],["Hund","pies"],
  ["Katze","kot"],["Vogel","ptak"],["Fisch","ryba"],["Pferd","koń"],["Brot","chleb"],
  ["Milch","mleko"],["Käse","ser"],["Fleisch","mięso"],["Obst","owoce"],["Gemüse","warzywa"],
  ["Tisch","stół"],["Stuhl","krzesło"],["Bett","łóżko"],["Tür","drzwi"],["Fenster","okno"],
  ["Straße","ulica"],["Brücke","most"],["Berg","góra"],["See","jezioro"],["Meer","morze"],
  ["Fluss","rzeka"],["Wald","las"],["Garten","ogród"],["Himmel","niebo"],["Sonne","słońce"],
  ["Mond","księżyc"],["Stern","gwiazda"],["Wolke","chmura"],["Regen","deszcz"],["Schnee","śnieg"],
  ["Wind","wiatr"],["Sommer","lato"],["Winter","zima"],["Frühling","wiosna"],["Herbst","jesień"],
  ["Montag","poniedziałek"],["Dienstag","wtorek"],["Mittwoch","środa"],["Donnerstag","czwartek"],["Freitag","piątek"],
  ["Samstag","sobota"],["Sonntag","niedziela"],["rot","czerwony"],["blau","niebieski"],["grün","zielony"],
  ["gelb","żółty"],["schwarz","czarny"],["weiß","biały"],["grau","szary"],["braun","brązowy"],
  ["groß","duży"],["klein","mały"],["gut","dobry"],["schlecht","zły"],["neu","nowy"],
  ["alt","stary"],["jung","młody"],["schön","ładny"],["schnell","szybki"],["langsam","wolny"],
  ["stark","silny"],["schwach","słaby"],["leicht","lekki"],["schwer","ciężki"],["heiß","gorący"],
  ["kalt","zimny"],["warm","ciepły"],["laut","głośny"],["leise","cichy"],["viel","dużo"],
  ["wenig","mało"],["mehr","więcej"],["oft","często"],["nie","nigdy"],["immer","zawsze"],
  ["manchmal","czasami"],["hier","tutaj"],["dort","tam"],["mit","z"],["ohne","bez"],
  ["für","dla"],["über","nad"],["unter","pod"],["neben","obok"],["durch","przez"],
  ["eins","jeden"],["zwei","dwa"],["drei","trzy"],["vier","cztery"],["fünf","pięć"],
  ["sechs","sześć"],["sieben","siedem"],["acht","osiem"],["neun","dziewięć"],["zehn","dziesięć"],
  ["zwanzig","dwadzieścia"],["hundert","sto"],["tausend","tysiąc"],["Arzt","lekarz"],["Bahnhof","dworzec"],
  ["Flughafen","lotnisko"],["Pass","paszport"],["Koffer","walizka"],["Handy","komórka"],["Sprache","język"],
  ["Wort","słowo"],["Antwort","odpowiedź"],["Hilfe","pomoc"],["Freund","przyjaciel"],["Familie","rodzina"],
  ["Mutter","matka"],["Vater","ojciec"],["Bruder","brat"],["Schwester","siostra"],["Waffe","broń"],
];
const BID='builtin';

// ── DB ──
function mkDB(){return{decks:[{id:BID,name:'1000 PODSTAWOWYCH SŁÓW',builtIn:true,words:BV.map(([g,p])=>({ger:g,pol:p}))}],progress:{},dailyActivity:{},totalScore:0};}
function loadDB(){try{const r=localStorage.getItem(STORE);if(!r)return mkDB();const d=JSON.parse(r);if(!d.decks.find(x=>x.id===BID))d.decks.unshift({id:BID,name:'1000 PODSTAWOWYCH SŁÓW',builtIn:true,words:BV.map(([g,p])=>({ger:g,pol:p}))});return d;}catch(e){return mkDB();}}
function saveDB(){localStorage.setItem(STORE,JSON.stringify(db));}
let db=loadDB();

// ── SRS ──
const IV=[1,10,60,480,1440,4320,10080,43200];
function wk(w){return w.ger+'|'+w.pol;}
function gp(did,w){if(!db.progress[did])db.progress[did]={};const k=wk(w);if(!db.progress[did][k])db.progress[did][k]={level:0,correct:0,wrong:0,due:0,lastSeen:0};return db.progress[did][k];}
function sched(did,w,ok){const p=gp(did,w);if(ok){p.correct++;p.level=Math.min(p.level+1,IV.length-1);}else{p.wrong++;p.level=Math.max(0,p.level-1);}p.due=Date.now()+IV[p.level]*60000;p.lastSeen=Date.now();}
function isDue(p){return Date.now()>=p.due;}
function getDue(deck,n){
  const now=Date.now();const wps=deck.words.map(w=>({w,p:gp(deck.id,w)}));
  let d=wps.filter(x=>x.p.due<=now).sort((a,b)=>a.p.due-b.p.due);
  if(d.length<n)d=d.concat(wps.filter(x=>x.p.due>now).sort((a,b)=>a.p.due-b.p.due).slice(0,n-d.length));
  d.sort((a,b)=>{if(a.p.level===0&&b.p.level!==0)return -1;if(b.p.level===0&&a.p.level!==0)return 1;return a.p.due-b.p.due;});
  return d.slice(0,n).map(x=>x.w);
}
function getDist(deck,cw,n){
  let pool=deck.words.filter(w=>wk(w)!==wk(cw));
  pool.sort((a,b)=>sim(b.pol,cw.pol)-sim(a.pol,cw.pol));
  const top=pool.slice(0,Math.min(30,pool.length));
  for(let i=top.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[top[i],top[j]]=[top[j],top[i]];}
  let res=top.slice(0,n);
  if(res.length<n){const base=db.decks.find(d=>d.id===BID);if(base){let ex=base.words.filter(w=>wk(w)!==wk(cw)&&!res.find(r=>r.ger===w.ger));for(let i=ex.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ex[i],ex[j]]=[ex[j],ex[i]];}res=res.concat(ex.slice(0,n-res.length));}}
  return res.slice(0,n);
}
function sim(a,b){let s=0;if(a[0]===b[0])s+=2;if(a.length===b.length)s++;const sa=new Set(a),sb=new Set(b);for(const c of sa)if(sb.has(c))s++;return s;}

// ── DUCK ENTITY ──
class Duck{
  constructor(w,ok,x,y,sc){this.w=w;this.ok=ok;this.x=x;this.y=y;this.sc=sc;this.vx=(Math.random()>.5?1:-1)*(.4+Math.random()*.8);this.dying=false;this.dt=0;this.hi=false;this.wb=Math.random()*Math.PI*2;this.lel=null;}
  get sw(){return DK[0].length*this.sc;}get sh(){return DK.length*this.sc;}
  upd(dt){
    if(this.dying){this.dt+=dt;this.y+=3;return this.dt<.55;}
    this.x+=this.vx;if(this.x<W*.1){this.x=W*.1;this.vx*=-1;}if(this.x>W*.9-this.sw){this.x=W*.9-this.sw;this.vx*=-1;}
    this.wb+=dt*3;this.y+=Math.sin(this.wb)*.3;return true;
  }
  draw(){
    let cl=[...DC];if(this.dying)cl=cl.map(c=>c?'#ffff88':null);if(this.hi){cl[2]='#ff4400';cl[3]='#ffaa00';}
    const al=this.dying?Math.max(0,1-this.dt/.55):1;ctx.globalAlpha=al;
    drawSp(ctx,this.dying&&this.dt>.2?DD:DK,cl,Math.floor(this.x),Math.floor(this.y),this.sc,this.vx<0);ctx.globalAlpha=1;
  }
  updL(){if(!this.lel)return;this.lel.style.left=Math.floor(this.x+this.sw/2)+'px';this.lel.style.top=Math.floor(this.y+this.sh+4)+'px';}
  hit(mx,my){return mx>=this.x&&mx<=this.x+this.sw&&my>=this.y&&my<=this.y+this.sh;}
}

// ── GAME LOOP ──
function loop(ts){
  if(!gActive)return;const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;
  let sx=0,sy=0;if(shakeT>0){sx=(Math.random()-.5)*shakeA;sy=(Math.random()-.5)*shakeA;shakeT--;shakeA*=.8;}
  ctx.save();ctx.translate(sx,sy);
  drawBG();
  parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.3;p.life-=p.dec;if(p.life<=0)return false;ctx.globalAlpha=p.life;ctx.fillStyle=p.c;ctx.fillRect(Math.floor(p.x),Math.floor(p.y),p.sz,p.sz);ctx.globalAlpha=1;return true;});
  ducks=ducks.filter(d=>{const a=d.upd(dt);d.draw();d.updL();if(!a&&d.lel){d.lel.remove();d.lel=null;}return a;});
  gunBob=Math.sin(Date.now()*.003)*3;if(gunRecoil>0)gunRecoil=Math.max(0,gunRecoil-dt*8);
  drawGun();drawCH();ctx.restore();drawHUD();
  animId=requestAnimationFrame(loop);
}

  const cx=mouseX,cy=mouseY,s=14,g=5;

  ctx.beginPath();ctx.moveTo(cx-s,cy);ctx.lineTo(cx-g,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+g,cy);ctx.lineTo(cx+s,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-s);ctx.lineTo(cx,cy-g);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy+g);ctx.lineTo(cx,cy+s);ctx.stroke();
  ctx.fillStyle='rgba(255,80,0,.85)';ctx.fillRect(cx-1,cy-1,3,3);
  ctx.strokeStyle='rgba(255,0,0,.25)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,cy,s+4,0,Math.PI*2);ctx.stroke();
}

// ── DUCKS ──
function clearDucks(){ducks.forEach(d=>{if(d.lel){d.lel.remove();d.lel=null;}});ducks=[];document.getElementById('dlabels').innerHTML='';}
function spawnDucks(cw,dist){
  clearDucks();const all=[cw,...dist];for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];}
  const fY=Math.floor((H-88)*.62),sp=W/(all.length+1);
  all.forEach((w,i)=>{
    const ok=wk(w)===wk(cw),sc=[3,4,5,5][Math.floor(Math.random()*4)];
    const dw=DK[0].length*sc,dh=DK.length*sc;
    const x=Math.max(W*.1,Math.min(W*.9-dw,sp*(i+1)-dw/2+(Math.random()-.5)*40));
    const y=40+Math.random()*(fY-dh-60);
    const d=new Duck(w,ok,x,y,sc);
    const lel=document.createElement('div');lel.className='dlabel';lel.textContent=w.ger;
    document.getElementById('dlabels').appendChild(lel);d.lel=lel;d.updL();ducks.push(d);
  });
}

gc.addEventListener('click',e=>{
  if(!gActive||!canShoot)return;
  const mx=e.clientX,my=e.clientY;
  gunRecoil=1.5;shakeT=5;shakeA=6;
  let hit=null;for(const d of ducks){if(!d.dying&&d.hit(mx,my)){hit=d;break;}}
  if(!hit){spawnP(mx,my,'#888',4);return;}
  // Always speak the duck's German word on click
  speak(hit.w.ger);
  if(hit.ok){
    hit.dying=true;if(hit.lel)hit.lel.style.display='none';
    spawnP(mx,my,'#ffd700',16,true);spawnP(mx,my,'#ff8800',10,true);
    sched(cDeck.id,hit.w,true);saveDB();score+=10+streak*3;streak++;rCor++;recDay(true);
    canShoot=false;showMsg('DUCK DOWN!','#ffd700');doFlash('rgba(255,200,0,.12)');rIdx++;
    setTimeout(()=>{clearDucks();nextQ();},900);
  } else {
    ammo--;spawnP(mx,my,'#ff4400',8);doFlash('rgba(200,0,0,.18)');
    showMsg(ammo>0?'WRONG DUCK! AMMO: '+ammo:'OUT OF AMMO!','#ff4400');
    if(ammo<=0){
      canShoot=false;ducks.forEach(d=>{if(d.ok)d.hi=true;});
      sched(cDeck.id,hit.w,false);saveDB();streak=0;rWrong++;recDay(false);rIdx++;
      setTimeout(()=>{clearDucks();nextQ();},1600);
    }
  }
});

// ── FLOW ──
function startGame(deckId){
  const deck=db.decks.find(d=>d.id===deckId);
  if(!deck||deck.words.length<2){alert('DECK TOO SMALL — ADD MORE WORDS FIRST!');return;}
  cDeck=deck;selDeckId=deckId;
  hideAll();document.getElementById('hud').classList.add('on');
  document.getElementById('wordbar').classList.add('on');document.getElementById('wordbar').style.display='flex';
  gActive=true;score=0;streak=0;rCor=0;rWrong=0;rIdx=0;ammo=3;parts=[];
  rWords=getDue(deck,Math.min(15,deck.words.length));
  nextQ();lastT=performance.now();if(animId)cancelAnimationFrame(animId);animId=requestAnimationFrame(loop);
}

function nextQ(){
  if(rIdx>=rWords.length){endRound();return;}
  canShoot=true;ammo=3;parts=[];
  cWord=rWords[rIdx];
  document.getElementById('wb-word').textContent=cWord.pol.toUpperCase();
  document.getElementById('wb-prog').textContent=(rIdx+1)+'/'+rWords.length;
  document.getElementById('wb-deck').textContent=cDeck.name.slice(0,22);
  spawnDucks(cWord,getDist(cDeck,cWord,rIdx>7?3:2));
}

function endRound(){
  gActive=false;canShoot=false;clearDucks();if(animId)cancelAnimationFrame(animId);
  db.totalScore=(db.totalScore||0)+score;saveDB();
  const acc=rCor+rWrong>0?Math.round(rCor/(rCor+rWrong)*100):0;
  document.getElementById('re-title').textContent=acc>=70?'LEVEL COMPLETE':acc>=40?'YOU SURVIVED':'MISSION FAILED';
  document.getElementById('re-body').innerHTML=`<p>DECK: <strong>${cDeck.name}</strong></p><p>DUCKS ELIMINATED: <strong>${rCor}</strong></p><p>MISSED: <strong>${rWrong}</strong></p><p>ACCURACY: <strong>${acc}%</strong></p><p>SCORE: <strong>${score}</strong></p><p style="font-size:5px;color:#220000;margin-top:8px;">MEMORY MATRIX UPDATED — EBBINGHAUS PROTOCOL ACTIVE</p>`;
  document.getElementById('rend').classList.add('on');
}

function renderDeckEditor(){
  document.getElementById('deck-editor-area').innerHTML=db.decks.map(dk=>`
    <div class="panel" style="margin-bottom:12px;">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
        <div style="font-size:7px;color:#cc4400;">${dk.name}${dk.builtIn?'<span style="font-size:5px;color:#330000;"> [BUILT-IN — READ ONLY]</span>':''}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;">
          ${!dk.builtIn?`<button class="mbtn xs dim" onclick="delDeck('${dk.id}')">✕ DELETE</button>`:''}
          ${!dk.builtIn?`<button class="mbtn xs yellow" onclick="document.getElementById('csv_${dk.id}').click()">↑ IMPORT CSV</button><input type="file" id="csv_${dk.id}" accept=".csv,.txt" style="display:none" onchange="handleCSV(event,'${dk.id}')">`: ''}
        </div>
      </div>
      ${!dk.builtIn?`<div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;">
        <input class="inp" id="ag_${dk.id}" placeholder="GERMAN WORD..." style="flex:1;min-width:100px;">
        <input class="inp" id="ap_${dk.id}" placeholder="POLISH TRANSLATION..." style="flex:1;min-width:100px;">
        <button class="mbtn green xs" onclick="addWord('${dk.id}')">+ ADD</button>
      </div>`:''}
      <div style="font-size:5px;color:#440000;margin-bottom:6px;">${dk.words.length} WORDS</div>
      <div style="max-height:160px;overflow-y:auto;">
        <table class="word-table"><thead><tr><th>GERMAN</th><th>POLISH</th>${!dk.builtIn?'<th></th>':''}</tr></thead><tbody>
          ${dk.words.slice(0,50).map(w=>`<tr><td style="color:#cc6600;">${w.ger}</td><td>${w.pol}</td>${!dk.builtIn?`<td><button class="del-btn" onclick="delWord('${dk.id}','${w.ger.replace(/'/g,"\\'")}','${w.pol.replace(/'/g,"\\'")}')">✕</button></td>`:''}</tr>`).join('')}
          ${dk.words.length>50?`<tr><td colspan="3" style="color:#280000;font-size:5px;padding:6px;">...and ${dk.words.length-50} more</td></tr>`:''}
        </tbody></table>
      </div>
    </div>`).join('');
}

function createDeck(){
  const name=document.getElementById('new-deck-name').value.trim().toUpperCase();
  if(!name){showMsg('ENTER A NAME','#ff4400');return;}
  const id='d'+Date.now();db.decks.push({id,name,builtIn:false,words:[]});saveDB();
  document.getElementById('new-deck-name').value='';renderDeckEditor();showMsg('DECK CREATED: '+name,'#ffd700');
}
function delDeck(id){if(!confirm('DELETE DECK?'))return;db.decks=db.decks.filter(d=>d.id!==id);delete db.progress[id];saveDB();renderDeckEditor();}
function addWord(did){
  const ger=document.getElementById('ag_'+did).value.trim();
  const pol=document.getElementById('ap_'+did).value.trim();
  if(!ger||!pol){showMsg('FILL BOTH FIELDS','#ff4400');return;}
  const deck=db.decks.find(d=>d.id===did);
  if(deck.words.find(w=>w.ger===ger)){showMsg('WORD ALREADY EXISTS','#ff4400');return;}
  deck.words.push({ger,pol});saveDB();document.getElementById('ag_'+did).value='';document.getElementById('ap_'+did).value='';renderDeckEditor();
}
function delWord(did,ger,pol){const deck=db.decks.find(d=>d.id===did);deck.words=deck.words.filter(w=>!(w.ger===ger&&w.pol===pol));saveDB();renderDeckEditor();}
function handleCSV(e,did){
  const f=e.target.files[0];if(!f)return;const deck=db.decks.find(d=>d.id===did);
  new FileReader().onload=ev=>{let n=0;ev.target.result.split('\n').forEach(line=>{const p=line.split(/[,;\t]/);if(p.length>=2){const g=p[0].trim(),po=p[1].trim();if(g&&po&&!deck.words.find(w=>w.ger===g)){deck.words.push({ger:g,pol:po});n++;}}});saveDB();renderDeckEditor();showMsg('IMPORTED '+n+' WORDS','#ffd700');};
  (function(fr,f){fr.readAsText(f);})(new FileReader().onload?new FileReader():Object.assign(new FileReader(),{onload:function(ev){let n=0;ev.target.result.split('\n').forEach(line=>{const p=line.split(/[,;\t]/);if(p.length>=2){const g=p[0].trim(),po=p[1].trim();if(g&&po&&!deck.words.find(w=>w.ger===g)){deck.words.push({ger:g,pol:po});n++;}}});saveDB();renderDeckEditor();showMsg('IMPORTED '+n+' WORDS','#ffd700');}}),f);
  e.target.value='';
}

// ── EXPORT / IMPORT ──
function exportData(){const b=new Blob([JSON.stringify({uid:UID,db},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='wortkrieg64_'+new Date().toISOString().slice(0,10)+'.json';a.click();}
function importData(e){const f=e.target.files[0];if(!f)return;const fr=new FileReader();fr.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!confirm('OVERWRITE ALL DATA?'))return;db=d.db||d;saveDB();drawMenuC();showMsg('DATA IMPORTED','#ffd700');}catch{showMsg('INVALID FILE','#ff4400');}};fr.readAsText(f);e.target.value='';}

// ── STATS ──
let sDeckId=BID,wFilter='all';
function renderStats(){
  document.getElementById('stats-deck-tabs').innerHTML=db.decks.map(dk=>`<button class="ftab${sDeckId===dk.id?' act':''}" onclick="setSD('${dk.id}',this)">${dk.name.slice(0,14)}</button>`).join('');
  renderBars();renderHeatmap();renderWordList('all');renderFTabs();
}
function setSD(id,el){sDeckId=id;document.querySelectorAll('#stats-deck-tabs .ftab').forEach(b=>b.classList.remove('act'));el.classList.add('act');renderBars();renderWordList(wFilter);}
function renderBars(){
  const deck=db.decks.find(d=>d.id===sDeckId);if(!deck)return;
  const prog=db.progress[sDeckId]||{};const total=deck.words.length;
  const cats=[
    deck.words.filter(w=>!prog[wk(w)]||prog[wk(w)].lastSeen===0).length,
    deck.words.filter(w=>{const p=prog[wk(w)];return p&&p.lastSeen>0&&p.level===0;}).length,
    deck.words.filter(w=>{const p=prog[wk(w)];return p&&p.level===1;}).length,
    deck.words.filter(w=>{const p=prog[wk(w)];return p&&p.level>=2&&p.level<=3;}).length,
    deck.words.filter(w=>{const p=prog[wk(w)];return p&&p.level>=4&&p.level<=5;}).length,
    deck.words.filter(w=>{const p=prog[wk(w)];return p&&p.level>=6;}).length,
  ];
  const max=Math.max(...cats,1);
  cats.forEach((v,i)=>{document.getElementById('bf'+i).style.width=Math.max(2,Math.round(v/max*100))+'%';document.getElementById('bc'+i).textContent=v+' ('+Math.round(v/total*100)+'%)';});
  const seen=deck.words.filter(w=>{const p=prog[wk(w)];return p&&p.lastSeen>0;}).length;
  const due=deck.words.filter(w=>{const p=prog[wk(w)];return p&&isDue(p)&&p.lastSeen>0;}).length;
  const pv=Object.values(prog);const tc=pv.reduce((s,p)=>s+p.correct,0),tw=pv.reduce((s,p)=>s+p.wrong,0);
  document.getElementById('s-total').textContent=total;document.getElementById('s-seen').textContent=seen;document.getElementById('s-due').textContent=due;document.getElementById('s-acc').textContent=tc+tw>0?Math.round(tc/(tc+tw)*100):0;
}
function renderHeatmap(){
  const wrap=document.getElementById('heatmap');wrap.innerHTML='';const act=db.dailyActivity||{};const today=new Date();
  for(let i=27;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);const key=d.toISOString().slice(0,10);const data=act[key]||{c:0,w:0};const tot=data.c+data.w;let bg='#080000';if(tot>0){const it=Math.min(tot/15,1);bg=`rgba(200,0,0,${.12+it*.7})`;}
  const cell=document.createElement('div');cell.style.cssText=`width:18px;height:18px;background:${bg};border:1px solid #1a0000;font-family:'Press Start 2P';font-size:4px;display:flex;align-items:center;justify-content:center;color:rgba(255,80,0,.7);`;cell.title=key+': '+tot;cell.textContent=tot||'';wrap.appendChild(cell);}
}
function renderFTabs(){const tabs=[{id:'all',l:'ALL'},{id:'due',l:'DUE'},{id:'mastered',l:'MASTERED'},{id:'new',l:'NEW'}];document.getElementById('ftabs').innerHTML=tabs.map(t=>`<button class="ftab${wFilter===t.id?' act':''}" onclick="renderWordList('${t.id}');document.querySelectorAll('#ftabs .ftab').forEach(b=>b.classList.remove('act'));this.classList.add('act')">${t.l}</button>`).join('');}
function renderWordList(filter){
  wFilter=filter;const deck=db.decks.find(d=>d.id===sDeckId);if(!deck){document.getElementById('wlist').innerHTML='';return;}
  const prog=db.progress[sDeckId]||{};let words=deck.words.map(w=>({w,p:prog[wk(w)]||{level:0,correct:0,wrong:0,due:0,lastSeen:0}}));
  if(filter==='due')words=words.filter(x=>x.p.lastSeen>0&&isDue(x.p));else if(filter==='mastered')words=words.filter(x=>x.p.level>=5);else if(filter==='new')words=words.filter(x=>x.p.lastSeen===0);
  words=words.sort((a,b)=>a.p.due-b.p.due).slice(0,120);const lvls=['NEW','LV1','LV2','LV3','LV4','LV5','LV6','LV7'];
  if(!words.length){document.getElementById('wlist').innerHTML='<div style="color:#220000;font-size:6px;padding:10px;">NO ENTRIES</div>';return;}
  document.getElementById('wlist').innerHTML=words.map(({w,p})=>`<div class="wrow"><span class="wg">${w.ger}</span><span class="wp">${w.pol}</span>${p.lastSeen>0&&isDue(p)?'<span class="duepip">DUE</span>':''}<span class="lvbadge lv${Math.min(p.level,5)}">${lvls[Math.min(p.level,7)]}</span></div>`).join('');
}

// ── HELPERS ──
function doFlash(c){const f=document.getElementById('flash');f.style.background=c;f.style.animation='none';f.offsetHeight;f.style.animation='flashAnim .3s forwards';}
let msgT=null;function showMsg(txt,col){const m=document.getElementById('msg');m.textContent=txt;m.style.color=col;m.style.borderColor=col;m.classList.add('on');if(msgT)clearTimeout(msgT);msgT=setTimeout(()=>m.classList.remove('on'),1300);}
function resetConfirm(){if(confirm('RESET ALL PROGRESS?')){localStorage.removeItem(STORE);db=mkDB();saveDB();drawMenuC();showMsg('ALL DATA WIPED','#ff4400');}}

// ── MENU CANVAS ──
function drawMenuC(){
  document.getElementById('uid-label').textContent=UID;
  const MW=Math.min(innerWidth,560),MH=260;mc.width=MW;mc.height=MH;mctx.imageSmoothingEnabled=false;
  mctx.fillStyle='#050005';mctx.fillRect(0,0,MW,MH);mctx.fillStyle='#0d0000';mctx.fillRect(0,MH*.65,MW,MH*.35);mctx.fillStyle='#110000';mctx.fillRect(0,MH*.65,MW,3);
  mctx.fillStyle='rgba(140,0,0,.4)';for(let i=0;i<20;i++)mctx.fillRect(Math.random()*MW,MH*.65+Math.random()*MH*.35,Math.random()*8+2,Math.random()*4+1);
  [[.08,4],[.25,5],[.5,6],[.72,5],[.9,4]].forEach(([xr,sc],i)=>{const dw=DK[0].length*sc,dh=DK.length*sc;drawSp(mctx,DK,DC,Math.floor(xr*MW-dw/2),Math.floor(MH*.65-dh),sc,i%2===0);});
  mctx.font='bold 20px "Press Start 2P"';mctx.fillStyle='#ff2200';mctx.fillText('WORTKRIEG',MW/2-120,MH*.22);mctx.fillStyle='#990000';mctx.fillText('64',MW/2+82,MH*.22);
  mctx.font='6px "Press Start 2P"';mctx.fillStyle='#440000';mctx.fillText('SHOOT THE CORRECT GERMAN TRANSLATION',MW/2-148,MH*.36);
  const seen=db.decks.reduce((s,dk)=>{const p=db.progress[dk.id]||{};return s+Object.values(p).filter(x=>x.lastSeen>0).length;},0);
  const mas=db.decks.reduce((s,dk)=>{const p=db.progress[dk.id]||{};return s+Object.values(p).filter(x=>x.level>=5).length;},0);
  mctx.font='5px "Press Start 2P"';mctx.fillStyle='#280000';mctx.fillText(`WORDS SEEN: ${seen}  |  MASTERED: ${mas}  |  SCORE: ${db.totalScore||0}`,MW/2-145,MH*.93);
}

// Fix CSV import (the previous inline closure was broken)
function handleCSV(e,did){
  const f=e.target.files[0];if(!f)return;
  const deck=db.decks.find(d=>d.id===did);
  const fr=new FileReader();
  fr.onload=ev=>{
    let n=0;
    ev.target.result.split('\n').forEach(line=>{
      const p=line.split(/[,;\t]/);
      if(p.length>=2){const g=p[0].trim(),po=p[1].trim();if(g&&po&&!deck.words.find(w=>w.ger===g)){deck.words.push({ger:g,pol:po});n++;}}
    });
    saveDB();renderDeckEditor();showMsg('IMPORTED '+n+' WORDS','#ffd700');
  };
  fr.readAsText(f);e.target.value='';
}

// ── BOOT ──
goMenu();
</script>
